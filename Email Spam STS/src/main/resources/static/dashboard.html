<!DOCTYPE html>
<html>
<head>
    <title>Email Threat Dashboard</title>

    <style>
        body{
            font-family: Arial;
            background:#f5f6fa;
            text-align:center;
        }

        .card{
            display:inline-block;
            background:white;
            padding:20px;
            margin:20px;
            width:200px;
            border-radius:10px;
            box-shadow:0px 2px 8px gray;
        }

        h1{
            margin-top:40px;
        }

        .number{
            font-size:40px;
            font-weight:bold;
        }
    </style>

</head>

<body>

<h1>Email Threat Detection Dashboard</h1>

<div class="card">
    <h2>Total Emails</h2>
    <div class="number" id="total">0</div>
</div>

<div class="card">
    <h2>Spam Emails</h2>
    <div class="number" id="spam">0</div>
</div>

<div class="card">
    <h2>Safe Emails</h2>
    <div class="number" id="safe">0</div>
</div>

<script>

function loadDashboard(){

fetch("http://localhost:8080/dashboard/emails")
.then(res => res.json())
.then(data => {

document.getElementById("total").innerText = data.length;

let spam = data.filter(e => e.result == "SPAM").length;

let safe = data.filter(e => e.result == "HAM").length;

document.getElementById("spam").innerText = spam;

document.getElementById("safe").innerText = safe;

})

}

setInterval(loadDashboard,2000)

loadDashboard()

</script>

</body>
</html>
